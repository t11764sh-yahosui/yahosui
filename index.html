<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>すれちがい美術展</title>
<style>
  /* ===== リセット & 基盤 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1a2e;
    --surface:   #16213e;
    --panel:     #0f3460;
    --accent:    #e94560;
    --gold:      #f5c518;
    --text:      #eaeaea;
    --muted:     #9aa0b0;
    --card-bg:   #fdf6e3;
    --card-border: #c8a96e;
    --radius:    12px;
    --shadow:    0 4px 20px rgba(0,0,0,0.5);
  }

  html, body {
    height: 100%;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo-icon { font-size: 1.6rem; }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .05em;
    color: var(--gold);
    flex: 1;
  }
  #connection-status {
    font-size: .75rem;
    padding: 4px 10px;
    border-radius: 99px;
    font-weight: 600;
    background: #333;
    color: var(--muted);
    transition: background .3s, color .3s;
  }
  #connection-status.connected   { background: #1a4731; color: #4caf72; }
  #connection-status.waiting     { background: #3a3000; color: var(--gold); }

  /* ===== メインレイアウト ===== */
  main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* ===== カード共通 ===== */
  .panel {
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .panel h2 {
    font-size: .85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel h2 .icon { font-size: 1rem; }

  /* ===== ボタン ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--panel);  color: var(--text); }
  .btn-gold      { background: var(--gold);   color: #1a1a2e; }
  .btn:disabled  { opacity: .4; pointer-events: none; }

  /* ===== 接続パネル ===== */
  #connect-section .room-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 480px) {
    #connect-section .room-options { grid-template-columns: 1fr; }
  }
  .room-card {
    background: var(--panel);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .room-card p { font-size: .8rem; color: var(--muted); margin-bottom: 10px; }
  .room-card input {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid #3a4a6a;
    background: var(--bg);
    color: var(--text);
    font-size: .9rem;
    margin-bottom: 8px;
  }
  #room-id-display {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--gold);
    margin: 6px 0 10px;
  }

  /* ===== 待機室 ===== */
  #waiting-room { display: none; }
  #player-list  { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .player-chip {
    background: var(--panel);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: .82rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .player-chip.me { border: 1px solid var(--accent); }

  /* ===== ゲームエリア ===== */
  #game-section { display: none; }

  /* キャンバス（作品スペース） */
  #canvas-area {
    position: relative;
    width: 100%;
    height: 360px;
    background: #fdf6e3;
    border: 2px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
    touch-action: none;
  }
  #canvas-area .canvas-label {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: .7rem;
    color: #b0a080;
    font-style: italic;
    pointer-events: none;
  }

  /* キャンバス上のカード */
  .placed-card {
    position: absolute;
    cursor: grab;
    user-select: none;
    touch-action: none;
    transition: box-shadow .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .placed-card:active { cursor: grabbing; box-shadow: 0 8px 24px rgba(0,0,0,.35); }
  .placed-card svg { display: block; }

  /* ===== 手札エリア ===== */
  #hand-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    min-height: 80px;
    margin-bottom: 12px;
  }
  #hand-area h3 {
    width: 100%;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 4px;
  }

  /* 手札カード */
  .hand-card {
    width: 68px;
    height: 100px;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .hand-card:hover, .hand-card:active {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    border-color: var(--accent);
  }
  .hand-card.selected {
    border-color: var(--accent);
    background: #fff5f5;
    transform: translateY(-6px);
    box-shadow: 0 8px 22px rgba(233,69,96,.35);
  }

  /* 表裏トグル */
  .face-toggle {
    position: absolute;
    bottom: 3px;
    right: 3px;
    font-size: .6rem;
    padding: 2px 5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    touch-action: manipulation;
    line-height: 1.2;
  }
  .face-toggle.front { background: #e8f0ff; color: #2a4caa; }
  .face-toggle.back  { background: #fff0e0; color: #aa6020; }

  /* 回転ボタン（選択中カード用） */
  #rotate-controls {
    display: none;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  #rotate-controls.visible { display: flex; }
  #rotate-controls span { font-size: .8rem; color: var(--muted); }

  /* ===== ゲームコントロール ===== */
  #game-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  /* ===== ログ ===== */
  #log-area {
    background: var(--bg);
    border: 1px solid var(--panel);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .78rem;
    color: var(--muted);
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.7;
  }
  #log-area .log-line { border-bottom: 1px solid rgba(255,255,255,.05); padding: 2px 0; }
  #log-area .log-line:last-child { border-bottom: none; color: var(--text); }

  /* ===== フェーズバナー ===== */
  #phase-banner {
    display: none;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-weight: 700;
    font-size: .95rem;
    margin-bottom: 12px;
  }
  #phase-banner.production { background: #1a3a1a; color: #6fcf6f; border: 1px solid #2a6a2a; }
  #phase-banner.gallery    { background: #3a2a00; color: var(--gold); border: 1px solid #6a5000; }
  #phase-banner.vote       { background: #3a0010; color: #ff8098; border: 1px solid #8a0030; }

  /* ===== モーダル ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: var(--shadow);
  }
  .modal-box h3 { color: var(--gold); margin-bottom: 12px; }
  .modal-box p  { font-size: .88rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ===== ユーティリティ ===== */
  .hidden { display: none !important; }
  .mt8 { margin-top: 8px; }
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <span class="logo-icon">🖼️</span>
  <h1>すれちがい美術展</h1>
  <span id="connection-status">未接続</span>
</header>

<main>

  <!-- 接続パネル -->
  <section id="connect-section" class="panel">
    <h2><span class="icon">🎨</span>ギャラリーへ入場</h2>

    <div style="margin-bottom:14px;">
      <label style="font-size:.82rem;color:var(--muted);display:block;margin-bottom:6px;">あなたのアーティスト名</label>
      <input id="username-input" type="text" placeholder="名前を入力…"
        style="padding:9px 12px;border-radius:8px;border:1px solid #3a4a6a;background:var(--bg);color:var(--text);font-size:.9rem;width:100%;max-width:280px;">
    </div>

    <div class="room-options">
      <!-- ホスト -->
      <div class="room-card">
        <p>🖌️ ギャラリーを開く（ホスト）</p>
        <div id="room-id-display">——</div>
        <button class="btn btn-primary" id="create-room-btn">部屋を作成する</button>
      </div>
      <!-- ゲスト -->
      <div class="room-card">
        <p>🚪 ギャラリーに入場（ゲスト）</p>
        <input id="room-id-input" type="text" placeholder="ルームIDを入力" maxlength="10">
        <button class="btn btn-secondary" id="join-room-btn">参加する</button>
      </div>
    </div>
  </section>

  <!-- 待機室 -->
  <section id="waiting-room" class="panel">
    <h2><span class="icon">⏳</span>入場待ち — ルームID: <span id="room-id-label" style="color:var(--gold)"></span></h2>
    <div id="player-list"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-gold" id="start-game-btn" disabled>🎲 展覧会を開幕する</button>
      <span id="start-hint" style="font-size:.78rem;color:var(--muted);">2人以上で開幕できます</span>
    </div>
  </section>

  <!-- ゲームエリア -->
  <section id="game-section">

    <!-- フェーズバナー -->
    <div id="phase-banner"></div>

    <!-- キャンバス（作品スペース） -->
    <div class="panel" style="padding:12px;">
      <h2><span class="icon">🖼️</span>作品スペース</h2>
      <div id="canvas-area">
        <span class="canvas-label">あなたの作品</span>
      </div>

      <!-- 回転コントロール（カード選択時に出現） -->
      <div id="rotate-controls">
        <span>選択中カードを回転：</span>
        <button class="btn btn-secondary" id="rotate-ccw-btn" style="padding:7px 12px;">↺ 左90°</button>
        <button class="btn btn-secondary" id="rotate-cw-btn"  style="padding:7px 12px;">↻ 右90°</button>
        <button class="btn btn-secondary" id="rotate-free-btn" style="padding:7px 12px;">🔢 任意</button>
        <button class="btn btn-secondary" id="return-card-btn" style="padding:7px 12px;color:#ff8098;">↩ 手札に戻す</button>
      </div>
    </div>

    <!-- 手札 -->
    <div id="hand-area">
      <h3>🃏 手札（カードをタップで配置 / 表裏を切り替え可能）</h3>
    </div>

    <!-- ゲームコントロール -->
    <div id="game-controls" class="panel" style="padding:12px;">
      <h2><span class="icon">⚙️</span>アクション</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary" id="mulligan-btn">🔄 マリガン（手札全交換）</button>
        <button class="btn btn-primary"   id="done-btn">✅ 制作完了を宣言</button>
      </div>
    </div>

    <!-- ログ -->
    <div class="panel" style="padding:12px;">
      <h2><span class="icon">📋</span>ギャラリーログ</h2>
      <div id="log-area"></div>
    </div>

  </section>

</main>

<!-- 任意角度入力モーダル -->
<div class="modal-overlay" id="rotate-modal">
  <div class="modal-box">
    <h3>🔢 回転角度を入力</h3>
    <p>0〜359の数字を入力してください（例：45 / 90 / 180）</p>
    <input id="rotate-angle-input" type="number" min="0" max="359" value="45"
      style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #3a4a6a;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:16px;">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="rotate-cancel-btn">キャンセル</button>
      <button class="btn btn-primary"   id="rotate-confirm-btn">回転する</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
//  定数 & ユーティリティ
// =====================================================================
const FIXED_ROOM_ID = 'yahosui';

// SVGで描く図形の種類（表・裏で別デザイン）
const SHAPES = [
  { id:'circle',   label:'丸' },
  { id:'triangle', label:'三角' },
  { id:'square',   label:'四角' },
  { id:'diamond',  label:'菱形' },
  { id:'star',     label:'星' },
  { id:'cross',    label:'十字' },
  { id:'crescent', label:'三日月' },
  { id:'hexagon',  label:'六角形' },
];

// 色パレット（表面）
const FRONT_COLORS = ['#e94560','#f5c518','#4fc3f7','#81c784','#ce93d8','#ffab40','#80deea','#ef9a9a'];
// 色パレット（裏面）
const BACK_COLORS  = ['#b71c1c','#f57f17','#0277bd','#2e7d32','#6a1b9a','#e65100','#00695c','#880e4f'];

function makeSVG(shapeId, color, size=52) {
  const s = size, h = size/2, r = size*0.38;
  const shapes = {
    circle:   `<circle cx="${h}" cy="${h}" r="${r}" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    triangle: `<polygon points="${h},${size*.1} ${size*.9},${size*.9} ${size*.1},${size*.9}" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    square:   `<rect x="${size*.15}" y="${size*.15}" width="${size*.7}" height="${size*.7}" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    diamond:  `<polygon points="${h},${size*.08} ${size*.92},${h} ${h},${size*.92} ${size*.08},${h}" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    star:     (() => {
      const pts=[]; for(let i=0;i<10;i++){
        const a=Math.PI/5*i - Math.PI/2, rad=i%2===0?r:r*0.42;
        pts.push(`${h+Math.cos(a)*rad},${h+Math.sin(a)*rad}`);
      } return `<polygon points="${pts.join(' ')}" fill="${color}" stroke="#fff" stroke-width="2"/>`;
    })(),
    cross:    `<rect x="${size*.38}" y="${size*.1}" width="${size*.24}" height="${size*.8}" rx="3" fill="${color}" stroke="#fff" stroke-width="2"/>
               <rect x="${size*.1}" y="${size*.38}" width="${size*.8}" height="${size*.24}" rx="3" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    crescent: `<path d="M${h},${size*.1} a${r},${r} 0 1,0 0,${r*2} a${r*.55},${r*.55} 0 1,1 0,-${r*2}" fill="${color}" stroke="#fff" stroke-width="2"/>`,
    hexagon:  (() => {
      const pts=[]; for(let i=0;i<6;i++){
        const a=Math.PI/3*i - Math.PI/6;
        pts.push(`${h+Math.cos(a)*r},${h+Math.sin(a)*r}`);
      } return `<polygon points="${pts.join(' ')}" fill="${color}" stroke="#fff" stroke-width="2"/>`;
    })(),
  };
  return `<svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${shapes[shapeId]||''}</svg>`;
}

function log(msg) {
  const area = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = `${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}  ${msg}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function setStatus(text, cls='') {
  const el = document.getElementById('connection-status');
  el.textContent = text;
  el.className = cls;
}

// =====================================================================
//  ゲーム状態
// =====================================================================
let myId       = null;   // PeerJS ID
let myName     = '';
let peer       = null;
let conn       = null;   // ホスト↔ゲスト間の接続
let isHost     = false;
let players    = {};     // { peerId: { name, ready } }
let gameStarted = false;

// 手札: [ { shape, frontColor, backColor, face:'front'|'back', id } ]
let hand = [];
// キャンバス上のカード: [ { id, shape, face, color, x, y, rotation, domEl } ]
let canvasCards = [];
let mulliganUsed = false;
let selectedPlacedCard = null;  // 回転・戻す操作対象

// =====================================================================
//  手札生成
// =====================================================================
function generateHand() {
  hand = [];
  const usedShapes = [];
  for (let i = 0; i < 4; i++) {
    let shape;
    do { shape = SHAPES[Math.floor(Math.random() * SHAPES.length)]; }
    while (usedShapes.includes(shape.id));
    usedShapes.push(shape.id);

    const fi = Math.floor(Math.random() * FRONT_COLORS.length);
    hand.push({
      id:          `card-${Date.now()}-${i}`,
      shape:       shape.id,
      label:       shape.label,
      frontColor:  FRONT_COLORS[fi],
      backColor:   BACK_COLORS[fi],
      face:        'front',   // 初期は表
    });
  }
  renderHand();
}

function renderHand() {
  const area = document.getElementById('hand-area');
  // h3だけ残してリセット
  [...area.querySelectorAll('.hand-card')].forEach(el => el.remove());

  hand.forEach(card => {
    const div = document.createElement('div');
    div.className = 'hand-card';
    div.dataset.cardId = card.id;

    const color = card.face === 'front' ? card.frontColor : card.backColor;
    div.innerHTML = makeSVG(card.shape, color, 46);

    // 表裏ボタン
    const toggle = document.createElement('button');
    toggle.className = `face-toggle ${card.face}`;
    toggle.textContent = card.face === 'front' ? '表' : '裏';
    toggle.title = '表裏を切り替え';
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      card.face = card.face === 'front' ? 'back' : 'front';
      renderHand();
    });
    div.appendChild(toggle);

    // カードタップ → キャンバスに配置
    div.addEventListener('click', () => placeCardToCanvas(card));

    area.appendChild(div);
  });
}

// =====================================================================
//  カードをキャンバスに配置
// =====================================================================
function placeCardToCanvas(card) {
  const canvas = document.getElementById('canvas-area');
  const cw = canvas.clientWidth, ch = canvas.clientHeight;

  // 手札から除去
  hand = hand.filter(c => c.id !== card.id);
  renderHand();

  // キャンバスDOM
  const el = document.createElement('div');
  el.className = 'placed-card';
  el.style.left = `${Math.random() * (cw - 70) + 5}px`;
  el.style.top  = `${Math.random() * (ch - 80) + 5}px`;

  const color = card.face === 'front' ? card.frontColor : card.backColor;
  const size = 58;
  el.innerHTML = makeSVG(card.shape, color, size);
  el.style.width  = size + 'px';
  el.style.height = size + 'px';

  const placed = {
    id: card.id, shape: card.shape, face: card.face,
    color, rotation: 0,
    origCard: card,  // 元データ（手札戻し用）
    domEl: el,
    x: parseFloat(el.style.left),
    y: parseFloat(el.style.top),
  };
  canvasCards.push(placed);

  // タップで選択
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    selectPlacedCard(placed);
    startDrag(e, placed);
  });

  canvas.appendChild(el);
  selectPlacedCard(placed);
  log(`🖼️ ${card.label}（${card.face === 'front' ? '表' : '裏'}面）をキャンバスに配置`);
}

// =====================================================================
//  配置済みカードの選択
// =====================================================================
function selectPlacedCard(placed) {
  // 前の選択解除
  if (selectedPlacedCard && selectedPlacedCard.domEl) {
    selectedPlacedCard.domEl.style.outline = '';
  }
  selectedPlacedCard = placed;
  if (placed) {
    placed.domEl.style.outline = '2px solid #e94560';
    placed.domEl.style.outlineOffset = '3px';
  }
  const ctrl = document.getElementById('rotate-controls');
  ctrl.classList.toggle('visible', !!placed);
}

// キャンバスの何もないところをタップ → 選択解除
document.getElementById('canvas-area').addEventListener('pointerdown', e => {
  if (e.target.id === 'canvas-area') selectPlacedCard(null);
});

// =====================================================================
//  ドラッグ（マウス & タッチ共用 Pointer Events）
// =====================================================================
function startDrag(e, placed) {
  const canvas = document.getElementById('canvas-area');
  const rect   = canvas.getBoundingClientRect();
  const startX = e.clientX - rect.left - placed.x;
  const startY = e.clientY - rect.top  - placed.y;
  const el     = placed.domEl;
  const size   = parseInt(el.style.width) || 58;

  function onMove(ev) {
    const cx = ev.clientX - rect.left - startX;
    const cy = ev.clientY - rect.top  - startY;
    placed.x = Math.max(0, Math.min(cx, canvas.clientWidth  - size));
    placed.y = Math.max(0, Math.min(cy, canvas.clientHeight - size));
    el.style.left = placed.x + 'px';
    el.style.top  = placed.y + 'px';
  }
  function onUp() {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup',   onUp);
  }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup',   onUp);
}

// =====================================================================
//  回転
// =====================================================================
function applyRotation(deg) {
  if (!selectedPlacedCard) return;
  selectedPlacedCard.rotation = (selectedPlacedCard.rotation + deg + 360) % 360;
  selectedPlacedCard.domEl.style.transform = `rotate(${selectedPlacedCard.rotation}deg)`;
}

document.getElementById('rotate-ccw-btn').addEventListener('click', () => applyRotation(-90));
document.getElementById('rotate-cw-btn').addEventListener('click',  () => applyRotation(90));

document.getElementById('rotate-free-btn').addEventListener('click', () => {
  document.getElementById('rotate-modal').classList.add('open');
  document.getElementById('rotate-angle-input').value = 45;
});
document.getElementById('rotate-cancel-btn').addEventListener('click', () => {
  document.getElementById('rotate-modal').classList.remove('open');
});
document.getElementById('rotate-confirm-btn').addEventListener('click', () => {
  const deg = parseInt(document.getElementById('rotate-angle-input').value) || 0;
  applyRotation(deg);
  document.getElementById('rotate-modal').classList.remove('open');
});

// =====================================================================
//  手札に戻す
// =====================================================================
document.getElementById('return-card-btn').addEventListener('click', () => {
  if (!selectedPlacedCard) return;
  const placed = selectedPlacedCard;

  // DOM削除
  placed.domEl.remove();
  // canvasCards から削除
  canvasCards = canvasCards.filter(c => c.id !== placed.id);
  // 手札に戻す
  hand.push(placed.origCard);
  renderHand();
  selectPlacedCard(null);
  log(`↩️ ${placed.origCard.label}を手札に戻しました`);
});

// =====================================================================
//  マリガン
// =====================================================================
document.getElementById('mulligan-btn').addEventListener('click', () => {
  if (mulliganUsed) { log('⚠️ マリガンは1ラウンドに1回のみです'); return; }
  if (canvasCards.length > 0) {
    log('⚠️ キャンバスにカードがある状態ではマリガンできません');
    return;
  }
  mulliganUsed = true;
  generateHand();
  document.getElementById('mulligan-btn').disabled = true;
  log('🔄 マリガン！手札を4枚引き直しました');
});

// =====================================================================
//  制作完了
// =====================================================================
document.getElementById('done-btn').addEventListener('click', () => {
  log(`✅ ${myName} が制作完了を宣言しました`);
  if (conn) {
    send({ type:'done', name: myName });
  }
});

// =====================================================================
//  PeerJS 接続
// =====================================================================
function initPeer(id) {
  peer = new Peer(id, {
    host: 'peerjs.92k.de', port: 443, secure: true, path: '/',
    config: { iceServers:[{urls:'stun:stun.l.google.com:19302'}] }
  });

  peer.on('open', peerId => {
    myId = peerId;
    setStatus('ロビー接続中', 'waiting');
    log(`🔗 接続完了（ID: ${peerId}）`);
    document.getElementById('room-id-display').textContent = FIXED_ROOM_ID;
  });

  peer.on('connection', c => {
    conn = c;
    setupConn(c);
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id') {
      // IDが使われていたらゲストモードへ
      log('⚠️ そのIDは使用中です');
    } else {
      log(`❌ PeerJSエラー: ${err.message}`);
    }
  });
}

function setupConn(c) {
  c.on('open', () => {
    setStatus('接続中', 'connected');
    if (!isHost) {
      send({ type:'join', name: myName, id: myId });
    }
  });
  c.on('data', d => handleMessage(d));
  c.on('close', () => {
    setStatus('切断', '');
    log('🔌 接続が切れました');
  });
}

function send(data) {
  if (conn && conn.open) conn.send(data);
}

function handleMessage(data) {
  switch (data.type) {
    case 'join':
      if (isHost) {
        players[data.id] = { name: data.name };
        updatePlayerList();
        send({ type:'playerList', players });
        log(`🚪 ${data.name} が入場しました`);
      }
      break;
    case 'playerList':
      players = data.players;
      updatePlayerList();
      break;
    case 'startGame':
      startGame();
      break;
    case 'done':
      log(`✅ ${data.name} が制作完了を宣言しました`);
      break;
  }
}

// =====================================================================
//  UI: 待機室
// =====================================================================
function updatePlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  const allPlayers = { [myId]: { name: myName }, ...players };
  const count = Object.keys(allPlayers).length;

  Object.entries(allPlayers).forEach(([id, p]) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (id === myId ? ' me' : '');
    chip.textContent = (id === myId ? '🎨 ' : '👤 ') + p.name;
    list.appendChild(chip);
  });

  const startBtn  = document.getElementById('start-game-btn');
  const startHint = document.getElementById('start-hint');
  if (isHost) {
    startBtn.disabled = count < 2;
    startHint.textContent = count < 2 ? '2人以上で開幕できます' : `${count}人が集まりました！`;
  } else {
    startBtn.disabled = true;
    startHint.textContent = 'ホストが開幕を宣言するまでお待ちください';
  }
}

// =====================================================================
//  ゲーム開始
// =====================================================================
function startGame() {
  document.getElementById('waiting-room').style.display = 'none';
  document.getElementById('game-section').style.display = 'block';
  gameStarted = true;
  mulliganUsed = false;
  canvasCards = [];
  document.getElementById('canvas-area').querySelectorAll('.placed-card').forEach(el => el.remove());
  document.getElementById('mulligan-btn').disabled = false;
  generateHand();

  const banner = document.getElementById('phase-banner');
  banner.style.display = 'block';
  banner.className = 'production';
  banner.textContent = '🎨 制作フェイズ — テーマに沿って図形を配置してください';

  log('🎲 展覧会が開幕しました！制作フェイズ開始。');
}

// =====================================================================
//  ボタンイベント
// =====================================================================
document.getElementById('create-room-btn').addEventListener('click', () => {
  myName = document.getElementById('username-input').value.trim() || 'アーティスト';
  isHost = true;
  players[FIXED_ROOM_ID] = { name: myName };
  initPeer(FIXED_ROOM_ID);

  document.getElementById('connect-section').style.display = 'none';
  document.getElementById('waiting-room').style.display = 'block';
  document.getElementById('room-id-label').textContent = FIXED_ROOM_ID;
  updatePlayerList();
  log(`🏛️ ${myName} がギャラリーを開設しました（ID: ${FIXED_ROOM_ID}）`);
});

document.getElementById('join-room-btn').addEventListener('click', () => {
  myName = document.getElementById('username-input').value.trim() || 'ビジター';
  const targetId = document.getElementById('room-id-input').value.trim() || FIXED_ROOM_ID;

  // ランダムID生成（重複入場防止のため別IDで接続）
  const guestId = 'guest-' + Math.random().toString(36).slice(2,7);
  initPeer(guestId);

  peer.on('open', () => {
    conn = peer.connect(targetId);
    setupConn(conn);
    document.getElementById('connect-section').style.display = 'none';
    document.getElementById('waiting-room').style.display = 'block';
    document.getElementById('room-id-label').textContent = targetId;
    log(`🚪 ${myName} がギャラリーに向かっています…`);
  });
});

document.getElementById('start-game-btn').addEventListener('click', () => {
  if (!isHost) return;
  send({ type:'startGame' });
  startGame();
});
</script>
