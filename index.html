<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>すれちがい美術展</title>
<!-- PeerJSを最初に読み込む -->
<script src="[unpkg.com](https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js)"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1a2e;
    --surface:   #16213e;
    --panel:     #0f3460;
    --accent:    #e94560;
    --gold:      #f5c518;
    --text:      #eaeaea;
    --muted:     #9aa0b0;
    --card-bg:   #fdf6e3;
    --card-border: #c8a96e;
    --radius:    12px;
    --shadow:    0 4px 20px rgba(0,0,0,0.5);
  }

  html, body {
    height: 100%;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo-icon { font-size: 1.6rem; }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .05em;
    color: var(--gold);
    flex: 1;
  }
  #connection-status {
    font-size: .75rem;
    padding: 4px 10px;
    border-radius: 99px;
    font-weight: 600;
    background: #333;
    color: var(--muted);
    transition: background .3s, color .3s;
  }
  #connection-status.connected { background: #1a4731; color: #4caf72; }
  #connection-status.waiting   { background: #3a3000; color: var(--gold); }

  main { padding: 16px; max-width: 900px; margin: 0 auto; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .panel h2 {
    font-size: .85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--panel);  color: var(--text); }
  .btn-gold      { background: var(--gold);   color: #1a1a2e; }
  .btn:disabled  { opacity: .4; pointer-events: none; }

  #connect-section .room-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 480px) {
    #connect-section .room-options { grid-template-columns: 1fr; }
  }
  .room-card {
    background: var(--panel);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .room-card p { font-size: .8rem; color: var(--muted); margin-bottom: 10px; }
  .room-card input {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid #3a4a6a;
    background: var(--bg);
    color: var(--text);
    font-size: .9rem;
    margin-bottom: 8px;
  }
  #room-id-display {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--gold);
    margin: 6px 0 10px;
  }

  #waiting-room { display: none; }
  #player-list  { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .player-chip {
    background: var(--panel);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: .82rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .player-chip.me { border: 1px solid var(--accent); }

  #game-section { display: none; }

  #canvas-area {
    position: relative;
    width: 100%;
    height: 360px;
    background: #fdf6e3;
    border: 2px solid var(--card-border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
    touch-action: none;
  }
  #canvas-area .canvas-label {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: .7rem;
    color: #b0a080;
    font-style: italic;
    pointer-events: none;
  }

  .placed-card {
    position: absolute;
    cursor: grab;
    user-select: none;
    touch-action: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placed-card:active { cursor: grabbing; }
  .placed-card.selected {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  #hand-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    min-height: 80px;
    margin-bottom: 12px;
  }
  #hand-area h3 {
    width: 100%;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .hand-card {
    width: 68px;
    height: 100px;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .hand-card:hover { transform: translateY(-4px); box-shadow: 0 6px 18px rgba(0,0,0,.4); border-color: var(--accent); }

  .face-toggle {
    position: absolute;
    bottom: 3px;
    right: 3px;
    font-size: .6rem;
    padding: 2px 5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    touch-action: manipulation;
    line-height: 1.2;
  }
  .face-toggle.front { background: #e8f0ff; color: #2a4caa; }
  .face-toggle.back  { background: #fff0e0; color: #aa6020; }

  #rotate-controls {
    display: none;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 8px 0;
  }
  #rotate-controls.visible { display: flex; }
  #rotate-controls span { font-size: .8rem; color: var(--muted); }

  #phase-banner {
    display: none;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-weight: 700;
    font-size: .95rem;
    margin-bottom: 12px;
  }
  #phase-banner.production { background: #1a3a1a; color: #6fcf6f; border: 1px solid #2a6a2a; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--panel);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: var(--shadow);
  }
  .modal-box h3 { color: var(--gold); margin-bottom: 12px; }
  .modal-box p  { font-size: .88rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  #log-area {
    background: var(--bg);
    border: 1px solid var(--panel);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .78rem;
    color: var(--muted);
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.7;
  }
  #log-area .log-line { border-bottom: 1px solid rgba(255,255,255,.05); padding: 2px 0; }
  #log-area .log-line:last-child { border-bottom: none; color: var(--text); }
</style>
</head>
<body>

<header>
  <span class="logo-icon">🖼️</span>
  <h1>すれちがい美術展</h1>
  <span id="connection-status">未接続</span>
</header>

<main>

  <!-- 接続パネル -->
  <section id="connect-section" class="panel">
    <h2><span>🎨</span>ギャラリーへ入場</h2>

    <div style="margin-bottom:14px;">
      <label style="font-size:.82rem;color:var(--muted);display:block;margin-bottom:6px;">あなたのアーティスト名</label>
      <input id="username-input" type="text" placeholder="名前を入力…"
        style="padding:9px 12px;border-radius:8px;border:1px solid #3a4a6a;background:var(--bg);color:var(--text);font-size:.9rem;width:100%;max-width:280px;">
    </div>

    <div class="room-options">
      <div class="room-card">
        <p>🖌️ ギャラリーを開く（ホスト）</p>
        <div id="room-id-display">——</div>
        <button class="btn btn-primary" id="create-room-btn">部屋を作成する</button>
      </div>
      <div class="room-card">
        <p>🚪 ギャラリーに入場（ゲスト）</p>
        <input id="room-id-input" type="text" placeholder="ルームIDを入力" maxlength="20">
        <button class="btn btn-secondary" id="join-room-btn">参加する</button>
      </div>
    </div>

    <div id="connect-log" style="margin-top:12px;font-size:.78rem;color:var(--muted);min-height:20px;"></div>
  </section>

  <!-- 待機室 -->
  <section id="waiting-room" class="panel">
    <h2>⏳ 入場待ち — ルームID: <span id="room-id-label" style="color:var(--gold)"></span></h2>
    <div id="player-list"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-gold" id="start-game-btn" disabled>🎲 展覧会を開幕する</button>
      <span id="start-hint" style="font-size:.78rem;color:var(--muted);">2人以上で開幕できます</span>
    </div>
  </section>

  <!-- ゲームエリア -->
  <section id="game-section">

    <div id="phase-banner"></div>

    <div class="panel" style="padding:12px;">
      <h2>🖼️ 作品スペース</h2>
      <div id="canvas-area">
        <span class="canvas-label">あなたの作品</span>
      </div>
      <div id="rotate-controls">
        <span>選択中：</span>
        <button class="btn btn-secondary" id="rotate-ccw-btn" style="padding:7px 12px;">↺ 左90°</button>
        <button class="btn btn-secondary" id="rotate-cw-btn"  style="padding:7px 12px;">↻ 右90°</button>
        <button class="btn btn-secondary" id="rotate-free-btn" style="padding:7px 12px;">🔢 任意</button>
        <button class="btn btn-secondary" id="return-card-btn" style="padding:7px 12px;color:#ff8098;">↩ 手札に戻す</button>
      </div>
    </div>

    <div id="hand-area">
      <h3>🃏 手札（カードをタップで配置 / 表裏ボタンで切り替え）</h3>
    </div>

    <div class="panel" style="padding:12px;">
      <h2>⚙️ アクション</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary" id="mulligan-btn">🔄 マリガン（手札全交換）</button>
        <button class="btn btn-primary"   id="done-btn">✅ 制作完了を宣言</button>
      </div>
    </div>

    <div class="panel" style="padding:12px;">
      <h2>📋 ギャラリーログ</h2>
      <div id="log-area"></div>
    </div>

  </section>

</main>

<!-- 任意角度モーダル -->
<div class="modal-overlay" id="rotate-modal">
  <div class="modal-box">
    <h3>🔢 回転角度を入力</h3>
    <p>0〜359の数字を入力してください</p>
    <input id="rotate-angle-input" type="number" min="0" max="359" value="45"
      style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #3a4a6a;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:16px;">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="rotate-cancel-btn">キャンセル</button>
      <button class="btn btn-primary"   id="rotate-confirm-btn">回転する</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
//  定数
// =====================================================================
const FIXED_ROOM_ID = 'yahosui';

const SHAPES = [
  { id:'circle',   label:'丸' },
  { id:'triangle', label:'三角' },
  { id:'square',   label:'四角' },
  { id:'diamond',  label:'菱形' },
  { id:'star',     label:'星' },
  { id:'cross',    label:'十字' },
  { id:'crescent', label:'三日月' },
  { id:'hexagon',  label:'六角形' },
];

const FRONT_COLORS = ['#e94560','#f5c518','#4fc3f7','#81c784','#ce93d8','#ffab40','#80deea','#ef9a9a'];
const BACK_COLORS  = ['#7a1428','#8a6e00','#01579b','#1b5e20','#4a148c','#bf360c','#004d40','#4e0f0f'];

// =====================================================================
//  SVG生成
// =====================================================================
function makeSVG(shapeId, color, size=52) {
  const h = size / 2;
  const r = size * 0.38;
  let inner = '';

  if (shapeId === 'circle') {
    inner = `<circle cx="${h}" cy="${h}" r="${r}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'triangle') {
    inner = `<polygon points="${h},${size*.1} ${size*.9},${size*.9} ${size*.1},${size*.9}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'square') {
    inner = `<rect x="${size*.15}" y="${size*.15}" width="${size*.7}" height="${size*.7}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'diamond') {
    inner = `<polygon points="${h},${size*.08} ${size*.92},${h} ${h},${size*.92} ${size*.08},${h}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'star') {
    const pts = [];
    for (let i = 0; i < 10; i++) {
      const a = Math.PI / 5 * i - Math.PI / 2;
      const rad = i % 2 === 0 ? r : r * 0.42;
      pts.push(`${h + Math.cos(a)*rad},${h + Math.sin(a)*rad}`);
    }
    inner = `<polygon points="${pts.join(' ')}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'cross') {
    inner = `<rect x="${size*.38}" y="${size*.1}" width="${size*.24}" height="${size*.8}" rx="3" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
             <rect x="${size*.1}" y="${size*.38}" width="${size*.8}" height="${size*.24}" rx="3" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>`;
  } else if (shapeId === 'crescent') {
    inner = `<path d="M${h},${size*.1} a${r},${r} 0 1,0 0,${r*2} a${r*.55},${r*.55} 0 1,1 0,-${r*2}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  } else if (shapeId === 'hexagon') {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 6;
      pts.push(`${h + Math.cos(a)*r},${h + Math.sin(a)*r}`);
    }
    inner = `<polygon points="${pts.join(' ')}" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
  }

  return `<svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${inner}</svg>`;
}

// =====================================================================
//  ログ & ステータス
// =====================================================================
function log(msg) {
  const area = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = 'log-line';
  const t = new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
  line.textContent = `${t}  ${msg}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function connectLog(msg) {
  document.getElementById('connect-log').textContent = msg;
}

function setStatus(text, cls) {
  const el = document.getElementById('connection-status');
  el.textContent = text;
  el.className = cls || '';
}

// =====================================================================
//  ゲーム状態
// =====================================================================
let myId        = null;
let myName      = '';
let peer        = null;
let connections = {};   // peerId → DataConnection（ホスト用・複数管理）
let hostConn    = null; // ゲスト用（ホストへの接続1本）
let isHost      = false;
let players     = {};   // { peerId: { name } }
let gameStarted = false;
let hand        = [];
let canvasCards = [];
let mulliganUsed      = false;
let selectedPlacedCard = null;

// =====================================================================
//  PeerJS 初期化（共通）
// =====================================================================
function initPeer(id, onOpen) {
  // 既存インスタンス破棄
  if (peer && !peer.destroyed) peer.destroy();

  peer = new Peer(id, {
    host: '0.peerjs.com',
    port: 443,
    secure: true,
    path: '/',
    debug: 1,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    }
  });

  peer.on('open', peerId => {
    myId = peerId;
    console.log('PeerJS open:', peerId);
    setStatus('ロビー接続中', 'waiting');
    connectLog(`✅ シグナリングサーバーに接続しました（ID: ${peerId}）`);
    if (onOpen) onOpen(peerId);
  });

  peer.on('error', err => {
    console.error('PeerJS error:', err.type, err.message);
    connectLog(`❌ エラー: ${err.type} — ${err.message}`);
    setStatus('エラー', '');

    // IDが使用中のとき（ホスト起動済みなら無視）
    if (err.type === 'unavailable-id') {
      connectLog('❌ そのルームIDはすでに使用中です。別の名前を試してください。');
    }
    if (err.type === 'peer-unavailable') {
      connectLog('❌ 指定したルームが見つかりません。IDを確認してください。');
    }
  });

  peer.on('disconnected', () => {
    setStatus('切断', '');
    connectLog('⚠️ シグナリングサーバーから切断されました');
  });

  // ホスト：着信接続を受け付ける
  if (isHost) {
    peer.on('connection', incomingConn => {
      console.log('incoming connection from:', incomingConn.peer);
      setupHostConn(incomingConn);
    });
  }
}

// =====================================================================
//  ホスト：接続管理
// =====================================================================
function setupHostConn(c) {
  connections[c.peer] = c;

  c.on('open', () => {
    console.log('host: conn open with', c.peer);
    // 既存プレイヤーリストを送信
    c.send({ type: 'playerList', players: getPlayerListData() });
  });

  c.on('data', data => {
    console.log('host received:', data);
    handleMessage(data, c.peer);
  });

  c.on('close', () => {
    console.log('host: conn closed:', c.peer);
    delete connections[c.peer];
    delete players[c.peer];
    updatePlayerList();
    broadcastExcept(null, { type: 'playerList', players: getPlayerListData() });
  });

  c.on('error', err => {
    console.error('conn error:', err);
  });
}

function broadcastAll(data) {
  Object.values(connections).forEach(c => { if (c.open) c.send(data); });
}

function broadcastExcept(excludePeerId, data) {
  Object.entries(connections).forEach(([pid, c]) => {
    if (pid !== excludePeerId && c.open) c.send(data);
  });
}

function getPlayerListData() {
  // 自分（ホスト）も含めて返す
  return { [myId]: { name: myName }, ...players };
}

// =====================================================================
//  ゲスト：接続管理
// =====================================================================
function setupGuestConn(c) {
  hostConn = c;

  c.on('open', () => {
    console.log('guest: conn open');
    setStatus('接続中', 'connected');
    // 自己紹介
    c.send({ type: 'join', name: myName, peerId: myId });
    connectLog('✅ ホストに接続しました！');
  });

  c.on('data', data => {
    console.log('guest received:', data);
    handleMessage(data, null);
  });

  c.on('close', () => {
    setStatus('切断', '');
    log('🔌 ホストとの接続が切れました');
  });

  c.on('error', err => {
    console.error('guest conn error:', err);
    connectLog(`❌ 接続エラー: ${err.message}`);
  });
}

function sendToHost(data) {
  if (hostConn && hostConn.open) hostConn.send(data);
}

// =====================================================================
//  メッセージ処理
// =====================================================================
function handleMessage(data, fromPeerId) {
  switch (data.type) {

    case 'join':
      // ホストが受信
      if (isHost) {
        // 重複チェック（同名・同IDの再入場防止）
        if (!players[data.peerId]) {
          players[data.peerId] = { name: data.name };
          updatePlayerList();
          const list = getPlayerListData();
          broadcastAll({ type: 'playerList', players: list });
          log(`🚪 ${data.name} が入場しました`);
        }
      }
      break;

    case 'playerList':
      // ゲストが受信
      players = data.players;
      updatePlayerList();
      break;

    case 'startGame':
      startGame();
      break;

    case 'done':
      log(`✅ ${data.name} が制作完了を宣言しました`);
      break;
  }
}

// =====================================================================
//  ボタン：部屋を作成
// =====================================================================
document.getElementById('create-room-btn').addEventListener('click', () => {
  myName = document.getElementById('username-input').value.trim() || 'アーティスト';
  isHost = true;
  connectLog('⏳ シグナリングサーバーに接続中…');

  initPeer(FIXED_ROOM_ID, peerId => {
    // open後にホスト用 peer.on('connection') は initPeer内で設定済み
    document.getElementById('room-id-display').textContent = FIXED_ROOM_ID;
    document.getElementById('connect-section').style.display = 'none';
    document.getElementById('waiting-room').style.display = 'block';
    document.getElementById('room-id-label').textContent = FIXED_ROOM_ID;
    updatePlayerList();
    log(`🏛️ ${myName} がギャラリーを開設しました`);
  });
});

// =====================================================================
//  ボタン：部屋に参加
// =====================================================================
document.getElementById('join-room-btn').addEventListener('click', () => {
  myName = document.getElementById('username-input').value.trim() || 'ビジター';
  const targetId = document.getElementById('room-id-input').value.trim() || FIXED_ROOM_ID;
  // ゲストはランダムID
  const guestPeerId = 'g-' + Math.random().toString(36).slice(2, 8);

  connectLog('⏳ 接続中…');
  isHost = false;

  initPeer(guestPeerId, () => {
    // open後にホストへ接続
    const c = peer.connect(targetId, { reliable: true });
    setupGuestConn(c);

    document.getElementById('connect-section').style.display = 'none';
    document.getElementById('waiting-room').style.display = 'block';
    document.getElementById('room-id-label').textContent = targetId;
  });
});

// =====================================================================
//  待機室 UI
// =====================================================================
function updatePlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';

  const all = isHost ? getPlayerListData() : players;
  const count = Object.keys(all).length;

  Object.entries(all).forEach(([id, p]) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (id === myId ? ' me' : '');
    chip.textContent = (id === myId ? '🎨 ' : '👤 ') + p.name;
    list.appendChild(chip);
  });

  const startBtn  = document.getElementById('start-game-btn');
  const startHint = document.getElementById('start-hint');

  if (isHost) {
    startBtn.disabled = count < 2;
    startHint.textContent = count < 2
      ? '2人以上で開幕できます'
      : `${count}人が集まりました！開幕できます`;
  } else {
    startBtn.disabled = true;
    startHint.textContent = 'ホストが開幕するまでお待ちください';
  }
}

document.getElementById('start-game-btn').addEventListener('click', () => {
  if (!isHost) return;
  broadcastAll({ type: 'startGame' });
  startGame();
});

// =====================================================================
//  ゲーム開始
// =====================================================================
function startGame() {
  document.getElementById('waiting-room').style.display = 'none';
  document.getElementById('game-section').style.display = 'block';
  gameStarted  = true;
  mulliganUsed = false;
  canvasCards  = [];
  document.querySelectorAll('.placed-card').forEach(el => el.remove());
  document.getElementById('mulligan-btn').disabled = false;
  generateHand();

  const banner = document.getElementById('phase-banner');
  banner.style.display = 'block';
  banner.className = 'production';
  banner.textContent = '🎨 制作フェイズ — テーマに沿って図形を配置してください';

  log('🎲 展覧会が開幕しました！制作フェイズ開始。');
}

// =====================================================================
//  手札生成
// =====================================================================
function generateHand() {
  hand = [];
  const used = [];
  for (let i = 0; i < 4; i++) {
    let s;
    do { s = SHAPES[Math.floor(Math.random() * SHAPES.length)]; }
    while (used.includes(s.id));
    used.push(s.id);

    const ci = Math.floor(Math.random() * FRONT_COLORS.length);
    hand.push({
      id:         `card-${Date.now()}-${i}`,
      shape:      s.id,
      label:      s.label,
      frontColor: FRONT_COLORS[ci],
      backColor:  BACK_COLORS[ci],
      face:       'front',
    });
  }
  renderHand();
}

function renderHand() {
  const area = document.getElementById('hand-area');
  area.querySelectorAll('.hand-card').forEach(el => el.remove());

  hand.forEach(card => {
    const div = document.createElement('div');
    div.className = 'hand-card';
    div.dataset.cardId = card.id;

    const color = card.face === 'front' ? card.frontColor : card.backColor;
    div.innerHTML = makeSVG(card.shape, color, 46);

    // 表裏ラベル
    const label = document.createElement('div');
    label.style.cssText = 'font-size:.55rem;color:#888;margin-top:2px;pointer-events:none;';
    label.textContent = card.label;
    div.appendChild(label);

    // 表裏トグルボタン
    const toggle = document.createElement('button');
    toggle.className = `face-toggle ${card.face}`;
    toggle.textContent = card.face === 'front' ? '表' : '裏';
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      card.face = card.face === 'front' ? 'back' : 'front';
      renderHand();
    });
    div.appendChild(toggle);

    div.addEventListener('click', () => placeCardToCanvas(card));
    area.appendChild(div);
  });
}

// =====================================================================
//  キャンバスへ配置
// =====================================================================
function placeCardToCanvas(card) {
  const canvas = document.getElementById('canvas-area');
  hand = hand.filter(c => c.id !== card.id);
  renderHand();

  const size = 58;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;

  const el = document.createElement('div');
  el.className = 'placed-card';
  el.style.width  = size + 'px';
  el.style.height = size + 'px';

  const color = card.face === 'front' ? card.frontColor : card.backColor;
  el.innerHTML = makeSVG(card.shape, color, size);

  const px = Math.random() * (cw - size - 10) + 5;
  const py = Math.random() * (ch - size - 10) + 5;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';

  const placed = {
    id: card.id, shape: card.shape,
    face: card.face, color,
    rotation: 0,
    origCard: { ...card },
    domEl: el,
    x: px, y: py,
  };
  canvasCards.push(placed);

  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    selectPlacedCard(placed);
    startDrag(e, placed);
  });

  canvas.appendChild(el);
  selectPlacedCard(placed);
  log(`🖼️ ${card.label}（${card.face === 'front' ? '表' : '裏'}面）を配置`);
}

// =====================================================================
//  選択
// =====================================================================
function selectPlacedCard(placed) {
  canvasCards.forEach(c => c.domEl.classList.remove('selected'));
  selectedPlacedCard = placed;
  if (placed) placed.domEl.classList.add('selected');
  document.getElementById('rotate-controls').classList.toggle('visible', !!placed);
}

document.getElementById('canvas-area').addEventListener('pointerdown', e => {
  if (e.target.id === 'canvas-area' || e.target.classList.contains('canvas-label')) {
    selectPlacedCard(null);
  }
});

// =====================================================================
//  ドラッグ
// =====================================================================
function startDrag(e, placed) {
  const canvas = document.getElementById('canvas-area');
  const rect   = canvas.getBoundingClientRect();
  const offX   = e.clientX - rect.left - placed.x;
  const offY   = e.clientY - rect.top  - placed.y;
  const size   = parseInt(placed.domEl.style.width) || 58;

  const onMove = ev => {
    const nx = Math.max(0, Math.min(ev.clientX - rect.left - offX, canvas.clientWidth  - size));
    const ny = Math.max(0, Math.min(ev.clientY - rect.top  - offY, canvas.clientHeight - size));
    placed.x = nx; placed.y = ny;
    placed.domEl.style.left = nx + 'px';
    placed.domEl.style.top  = ny + 'px';
  };
  const onUp = () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// =====================================================================
//  回転
// =====================================================================
function applyRotation(deg) {
  if (!selectedPlacedCard) return;
  selectedPlacedCard.rotation = (selectedPlacedCard.rotation + deg + 360) % 360;
  selectedPlacedCard.domEl.style.transform = `rotate(${selectedPlacedCard.rotation}deg)`;
}

document.getElementById('rotate-ccw-btn').addEventListener('click',  () => applyRotation(-90));
document.getElementById('rotate-cw-btn').addEventListener('click',   () => applyRotation(90));
document.getElementById('rotate-free-btn').addEventListener('click', () => {
  document.getElementById('rotate-modal').classList.add('open');
  document.getElementById('rotate-angle-input').value = 45;
});
document.getElementById('rotate-cancel-btn').addEventListener('click', () => {
  document.getElementById('rotate-modal').classList.remove('open');
});
document.getElementById('rotate-confirm-btn').addEventListener('click', () => {
  const deg = parseInt(document.getElementById('rotate-angle-input').value) || 0;
  applyRotation(deg);
  document.getElementById('rotate-modal').classList.remove('open');
});

// =====================================================================
//  手札に戻す
// =====================================================================
document.getElementById('return-card-btn').addEventListener('click', () => {
  if (!selectedPlacedCard) return;
  const p = selectedPlacedCard;
  p.domEl.remove();
  canvasCards = canvasCards.filter(c => c.id !== p.id);
  hand.push(p.origCard);
  renderHand();
  selectPlacedCard(null);
  log(`↩️ ${p.origCard.label} を手札に戻しました`);
});

// =====================================================================
//  マリガン
// =====================================================================
document.getElementById('mulligan-btn').addEventListener('click', () => {
  if (mulliganUsed) { log('⚠️ マリガンは1ラウンドに1回のみです'); return; }
  if (canvasCards.length > 0) { log('⚠️ キャンバスを空にしてからマリガンしてください'); return; }
  mulliganUsed = true;
  document.getElementById('mulligan-btn').disabled = true;
  generateHand();
  log('🔄 マリガン！手札を4枚引き直しました');
});

// =====================================================================
//  制作完了
// =====================================================================
document.getElementById('done-btn').addEventListener('click', () => {
  log(`✅ ${myName} が制作完了を宣言しました`);
  const msg = { type: 'done', name: myName };
  if (isHost) broadcastAll(msg);
  else sendToHost(msg);
});
</script>
</body>
</html>
